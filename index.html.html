<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayomide Studio | Graphic Design & Branding</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #000;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header { text-align: center; padding: 60px 20px; }
        h1 {
            font-size: 3.5rem;
            letter-spacing: 5px;
            background: linear-gradient(to right, #ff0000, #00ffd5, #ff00c8, #fffb00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1000px;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            border-radius: 15px;
            padding: 50px 20px;
            text-decoration: none;
            color: white;
            text-align: center;
            font-weight: bold;
            transition: 0.3s;
        }
        .card:hover {
            background: #fff;
            color: #000;
            transform: translateY(-10px);
        }
        footer {
            margin-top: auto;
            padding: 40px;
            text-align: center;
            width: 100%;
            background: #0a0a0a;
        }
        .whatsapp-btn {
            display: inline-block;
            padding: 15px 30px;
            background: #00ffd5;
            color: black;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Ayomide Studio</h1>
        <p style="color: #666; letter-spacing: 2px;">DESIGN • BRANDING • WEB</p>
    </header>

    <div class="container">
        <a href="sophomore.html" class="card">BRANDING</a>
        <a href="web.html" class="card">WEB DESIGN</a>
        <a href="illustration.html" class="card">ILLUSTRATION</a>
    </div>

    <footer>
        <a href="https://wa.me/2348074931115" class="whatsapp-btn">HIRE ME ON WHATSAPP</a>
        <p>📞 807493 1115</p>
        <p>📧 arikaweayomide428@gmail.com</p>
    </footer>

</body>
</html>
