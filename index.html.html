    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 80px 20px;
        }

        /* Rainbow Glow Title */
        h1 {
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: 10px;
            margin: 0;
            font-weight: 900;
            background: linear-gradient(to right, #ff0000, #00ffd5, #ff00c8, #fffb00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 255, 213, 0.4));
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            width: 90%;
            max-width: 1100px;
            margin-top: 50px;
        }

        .design-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #333;
            border-radius: 20px;
            padding: 60px 20px;
            text-decoration: none;
            color: white;
            text-align: center;
            transition: 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .design-card:hover {
            background: #fff;
            color: #000;
            transform: translateY(-15px);
            border-color: #fff;
            box-shadow: 0 10px 30px rgba(0, 255, 213, 0.5);
        }

        .design-card h2 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 3px;
        }

        footer {
            margin-top: auto;
            padding: 60px 20px;
            text-align: center;
            background: #080808;
            width: 100%;
            border-top: 1px solid #222;
        }

        .footer-content p { margin: 10px 0; color: #888; font-size: 1.1rem; }
        .footer-content a { color: #00ffd5; text-decoration: none; font-weight: bold; }
        
        .hire-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 40px;
            background: #00ffd5;
            color: black;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .hire-btn:hover { background: #fff; transform: scale(1.1); }
